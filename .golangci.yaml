version: "2"

linters:
  default: none
  enable:
    # Correctness
    - errcheck       # Unhandled errors (explicit `_ =` ignores are fine)
    - govet          # Suspicious constructs (printf, composites, etc.)
    - ineffassign    # Assignments whose value is never read
    - staticcheck    # Broad static analysis (SA, ST, QF, S1 checks)
    - unused         # Exported/unexported symbols that are never used

    # Error-handling hygiene — important for a library
    - errorlint                 # Enforce errors.Is/As and %w wrapping
    - nilerr                    # Return nil when err is non-nil
    - durationcheck             # Catches duration * duration bugs

    # Dead code / correctness helpers
    - unconvert                 # Unnecessary type conversions
    - wastedassign              # Assignments whose value is never read
    - predeclared               # Shadowing of predeclared identifiers
    - makezero                  # Non-zero-length make followed by append
    - reassign                  # Reassigning top-level variables (e.g. os.Stderr)
    - copyloopvar               # Legacy loop-variable copying (Go ≥1.22 only)
    - gocheckcompilerdirectives # Malformed //go: directives
    - bodyclose                 # HTTP response bodies left open

    # Concurrency / context
    - tparallel                 # t.Parallel misuse
    - fatcontext                # Nested context creation in loops

    # Style and idioms
    - misspell       # Common English misspellings in comments and strings
    - revive         # Opinionated but pragmatic Go linter (replaces golint)
    - dupword        # Duplicate words in comments ("the the")
    - whitespace     # Leading / trailing whitespace inside blocks
    - nakedret       # Discourages naked returns in long functions
    - usestdlibvars  # Use stdlib constants instead of magic strings/ints
    - goprintffuncname # *f/*ln/*Printf naming convention
    - asciicheck     # Non-ASCII identifiers
    - perfsprint     # fmt.Sprintf/Errorf → strconv / errors.New / concatenation

    # Test hygiene
    - thelper        # t.Helper() on test-helper functions

    # Security
    - gosec          # Common security mistakes (subprocess, file paths, crypto)

    # Lint hygiene
    - nolintlint     # Ensures //nolint directives are valid and documented

  settings:
    revive:
      rules:
        # error-return: error values should be the last return value.
        - name: error-return
          severity: warning
        # NOTE: exported (comment format) is enforced via staticcheck ST1020/21/22.
        # var-naming (ST1003) is enforced globally; public API exceptions are
        # tagged with per-site `//lint:ignore ST1003` directives.

    gosec:
      excludes:
        # G204: subprocess launched with a variable — intentional; go-plugin's
        # entire purpose is to exec plugin binaries supplied by the caller.
        - G204
        # G304: file path from variable — intentional for plugin binary discovery.
        - G304
        # G115: integer overflow on protocol versions and OS IDs — bounded values,
        # not a real overflow risk in this context.
        - G115
        # G118: context.WithCancel cancel func stored in a struct field (c.ctxCancel)
        # rather than called at the same call site — false positive.
        - G118

    staticcheck:
      checks:
        - "all"
        # SA1019 is intentionally enabled; grpc.Dial is not deprecated at the
        # current pinned grpc-go version. Remove this comment when it starts
        # firing and do the grpc.NewClient migration.

  exclusions:
    rules:
      # Test files: relaxed errcheck (testify-style helpers), gosec (low-risk
      # context), and revive (doc format is acceptable in tests).
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - revive

      # internal/ packages: relax revive — not public API surface.
      - path: internal/
        linters:
          - revive

      # Generated protobuf files — skip all linting.
      - path: \.pb\.go$
        linters:
          - errcheck
          - govet
          - ineffassign
          - staticcheck
          - unused
          - misspell
          - revive
          - gosec

    # Example programs demonstrate patterns (e.g. `sh -c "$PLUGIN_BIN"`) that
    # gosec flags by design. Lint in a follow-up if we decide examples should
    # be production-hardened.
    paths:
      - examples/

formatters:
  enable:
    - goimports      # Import grouping and formatting
